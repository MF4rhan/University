<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Bill Generator</title>
</head>
<body>
    <h1>Custom PC Bill Generator</h1>
    <hr>
    <h2>Processors</h2>
    <form action="#" method="post">
    <select name="processors" id="process">
        <option value="200">Intel i5</option>
        <option value="350">Intel i7</option>
        <option value="180">Ryzen 5</option>
    </select>
    <br>
    <h2>Ram</h2>
    <label for="ram1">8 GB Ram (50$)</label>
    <input type="radio" id="ram1" name="ramo">
    <label for="ram2">16 GB Ram (100$)</label>
    <input type="radio" id="ram2" name="ramo">
    <label for="ram3">32 GB Ram (200$)</label>
    <input type="radio" id="ram3" name="ramo">
    <br>
    <h2>Extras</h2>
    <label for="rgblight">RGB Lights (+30$)</label>
    <input type="checkbox" name="rgblight" id="checkrgb">
    <label for="checkcard">Wiresless Card (+20$)</label>
    <input type="checkbox" name="wireslesscard" id="checkcard">
    <label for="checkwarranty">Extra Warranty (+50$)</label>
    <input type="checkbox" name="extrawarranty" id="checkwarranty">
    <br>
    <label for="discount">Enter Discount Code: </label>
    <input type="text" id="discount" placeholder="Coupon">
    <br>
    <button type="button" id="billbutton">Generate Bill</button>
    </form>
    <br>
    <p id="result">No Bill Generated</p>
    
    <script>
        let billbtn = document.getElementById('billbutton');
        billbtn.addEventListener('click', function () {
        let processor = document.getElementById('process').value;
        let rame1 = document.getElementById('ram1').checked;
        let rame2 = document.getElementById('ram2').checked;
        let rame3 = document.getElementById('ram3').checked;
        let rgb = document.getElementById('checkrgb').checked;
        let card = document.getElementById('checkcard').checked;
        let warranty = document.getElementById('checkwarranty').checked;
        let sum = 0; 
        let discounto = document.getElementById('discount').value;
        if (rame1 || rame2 || rame3) 
        {
            if (rame1==true) 
            {
                sum = Number(processor)+50;
            }
            else if (rame2==true) 
            {
                sum = Number(processor)+100;
            } 
            else if (rame3==true)
            {
                sum = Number(processor)+200;
            }
            if (rgb==true) {
                sum = sum+30;
            }
            if (card==true) {
                sum = sum +20;
            }
            if (warranty == true) {
                sum = sum + 50;
            }
            if (discounto == "FAST2025") {
                sum = sum*0.90;
            }
            sum = sum*1.05; //tax
            let resul = document.getElementById('result');
            resul.innerText = "Total Cost (includes Tax): $" +sum;
        }
        else
        {
            alert("Choose Ram!");
            return;
        }
        });
    </script>




</body>
</html>
