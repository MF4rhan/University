    <style>
        .navbar {
            list-style: none;
            background-color: darkblue;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        .navbar li {
            float: left;
        }
        .navbar li a {
            text-align: center;
            display: block;
            color: aliceblue;
            text-decoration: none;
            padding: 14px 16px; /* 14px top/bottom, 16px left/right */
        }
        .navbar li a:hover {
            background-color: #333; /* Visual feedback on hover */
        }
        
        input[type=text], input[type=password], input[type=datetime-local] {
            width: 100%; /* Makes input fill the container */
            padding: 10px; /* Adds breathing room inside the box */
            margin: 5px 0; /* Adds space outside the box so they don't touch */
            border-radius: 5px; /* Slight curve is usually better than 50% or 5% */
            box-sizing: border-box;
            border: 2px solid purple; /* You forgot 'solid' in your code */
        }

        /* Let's make the form look like a card so we can see margins/padding clearly */
        form {
            width: 300px; /* Fixed width */
            margin: 20px auto; /* Centers the form in the middle of the page */
            padding: 20px; /* Space inside the border */
            border: 1px solid gray;
        }
        table
        {
            width: 300px;
            margin: 30px auto;
        }
    </style>
</head>
