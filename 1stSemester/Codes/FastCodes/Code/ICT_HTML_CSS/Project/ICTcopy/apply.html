<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>University Application</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      text-align: center;
      padding: 40px;
    }
    #form-container {
      display: none; /* The input spaces will be hidden until Apply is clicked. */
      margin-top: 20px;
    }
    form {
      display: inline-block;
      text-align: left;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
    }
    button {
      padding: 10px 15px;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3; /*This will apply a dark blue tint to a button when hovering the cursor over it.*/
    }
    
  </style>
</head>
<body>

  <h1>Apply for Admission</h1>

  <button id="apply-btn">Apply</button>

  <div id="form-container">
    <form id="application-form">
      <label for="name">Full Name:</label>
      <input type="text" id="name" required>

      <label for="roll">Roll Number:</label>
      <input type="text" id="roll" required>

      <label for="marks">Marks:</label>
      <input type="number" id="marks" required>

      <label for="age">Age:</label>
      <input type="number" id="age" required>

      <button type="submit">Submit</button>
    </form>
  </div>

  <script>
    // This will show the forum when Apply is clicked
    const applyBtn = document.getElementById('apply-btn');
    const formContainer = document.getElementById('form-container');
    const form = document.getElementById('application-form');

    applyBtn.addEventListener('click', () => {
      formContainer.style.display = 'block';
      applyBtn.style.display = 'none';
    });

    // This part will assign the input values to constants and save them into the browser
    form.addEventListener('submit', (e) => {
      e.preventDefault(); //This prevents refreshing the page

    const name = document.getElementById('name').value;
    const roll = document.getElementById('roll').value;
    const marks = document.getElementById('marks').value;
    const age = document.getElementById('age').value;

    localStorage.setItem('name', name);
    localStorage.setItem('roll', roll);
    localStorage.setItem('marks', marks);
    localStorage.setItem('age', age);

    alert('Application submitted successfully!');
    form.reset();
    });
     
  </script>
    <a href="result.html"><br><br>Check passed students</a>
</body>
</html>
